<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSPA Elektro - Planungs-Tool v2.2.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.1/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.47.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="template_data.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-container">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-bolt"></i>
                    <span>Elektro-Planer</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#gemeinsam" class="nav-item" data-view="gemeinsam">
                    <i class="fas fa-users"></i>
                    <span>Gemeinsam</span>
                </a>
                <a href="#privat" class="nav-item" data-view="privat">
                    <i class="fas fa-user-lock"></i>
                    <span>Privat</span>
                </a>
                <a href="#abteilung" class="nav-item" data-view="abteilung">
                    <i class="fas fa-microchip"></i>
                    <span>Abteilung</span>
                </a>
                <a href="#info" class="nav-item" data-view="info">
                    <i class="fas fa-bullhorn"></i>
                    <span>Infobereich</span>
                </a>
                <a href="#jahresaufgaben" class="nav-item" data-view="jahresaufgaben">
                    <i class="fas fa-calendar-check"></i>
                    <span>Jahresaufgaben</span>
                </a>
                <a href="#blockplan" class="nav-item" data-view="blockplan">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Blockpläne</span>
                </a>
                <a href="#stundenplan" class="nav-item" data-view="stundenplan">
                    <i class="fas fa-clock"></i>
                    <span>Stundenplan</span>
                </a>
                <a href="#notizen" class="nav-item" data-view="notizen">
                    <i class="fas fa-sticky-note"></i>
                    <span>Notizen</span>
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i class="fas fa-cog"></i>
                    <span>Einstellungen</span>
                </a>
                <a href="#ticker" class="nav-item" data-view="ticker">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>Ticker-Setup</span>
                </a>
                <div class="sidebar-version" id="sidebar-version-text">v2.2.0</div>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn-icon">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Lehrer+Elektro&background=005cb2&color=fff" alt="User">
                    <div class="user-info">
                        <span class="name">Lehrkraft</span>
                        <span class="role">Elektroabteilung</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button id="mobile-menu-toggle" class="btn-icon mobile-only">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="global-search" placeholder="Suche nach Aufgaben, Klassen...">
                </div>
                <div class="top-actions">
                    <div id="ticker-container" class="ticker-box">
                        <div id="ticker-content" class="ticker-text">Lade Informationen...</div>
                    </div>
                    <button class="btn btn-primary" id="add-widget-btn">
                        <i class="fas fa-plus"></i> Widget
                    </button>
                    <div class="notifications" id="notification-bell">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notif-count">0</span>
                    </div>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Dynamic Content Loads Here -->
            </div>
        </main>
    </div>

    <!-- Modal for adding widgets -->
    <div id="widget-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Widgets anpassen</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div id="modal-view-toggle" class="modal-tabs">
                <button class="tab-btn active" data-tab="manage">Verwalten</button>
                <button class="tab-btn" data-tab="create">Neu erstellen</button>
            </div>
            <div class="modal-body">
                <div id="manage-widget-view" class="tab-content active">
                    <div class="widget-options" id="widget-options-list">
                        <!-- Options will be populated by JS -->
                    </div>
                </div>
                <div id="create-widget-view" class="tab-content">
                    <form id="widget-form" class="widget-form">
                        <div class="form-group">
                            <label for="widget-name">Widget Name</label>
                            <input type="text" id="widget-name" placeholder="z.B. Packliste" required>
                        </div>
                        <div class="form-group">
                            <label>Widget Typ</label>
                            <div class="type-selector">
                                <label class="type-option">
                                    <input type="radio" name="widget-type" value="text" checked>
                                    <div class="type-card">
                                        <i class="fas fa-align-left"></i>
                                        <span>Textbaustein</span>
                                    </div>
                                </label>
                                <label class="type-option">
                                    <input type="radio" name="widget-type" value="checklist">
                                    <div class="type-card">
                                        <i class="fas fa-check-square"></i>
                                        <span>Checkliste</span>
                                    </div>
                                </label>
                                <label class="type-option">
                                    <input type="radio" name="widget-type" value="calendar">
                                    <div class="type-card">
                                        <i class="fas fa-calendar-alt"></i>
                                        <span>Kalender</span>
                                    </div>
                                </label>
                                <label class="type-option">
                                    <input type="radio" name="widget-type" value="import">
                                    <div class="type-card">
                                        <i class="fas fa-file-import"></i>
                                        <span>Liste importieren</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                        <div id="dynamic-fields">
                            <!-- Field for list import or default text etc. -->
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                            Widget erstellen
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
